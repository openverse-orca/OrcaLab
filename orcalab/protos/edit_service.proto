syntax = "proto3";

package SceneEdit;

enum StatusCode {
    Success = 0;
    Error = 1;
}

enum Space {
    Local = 0;
    World = 1;
}

message Transform {
    repeated double pos = 1;        // 位置 (3 elements)
    repeated double quat = 2;       // 旋转四元数 (4 elements)
    double scale = 3;               // 等比缩放 (1 elements)
}


message AlohaRequest {
    int32 value = 1;
}
message AlohaResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    int32 value = 3;
}


message AddGroupRequest {
    string actor_name = 2;          // Actor Entity 的名字
    string parent_actor_path = 3;   // Parent Actor 的路径
    Transform transform = 4;
    Space space = 5;
}
message AddAssetActorRequest {
    string spawnable_name = 1;
    string actor_name = 2;
    string parent_actor_path = 3;
    Transform transform = 4;
    Space space = 5;
}
message AddActorRequestUnion {
    oneof asset_oneof {
        AddAssetActorRequest asset_actor = 1;
        AddGroupRequest group_actor = 2;
    }
}
message AddActorBatchRequest {
    repeated AddActorRequestUnion requests = 1;
    bool stop_on_error = 2;
}
message AddActorBatchResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    repeated string errors = 3;
}



message DeleteActorBatchRequest {
    repeated string actor_paths = 1;
}
message DeleteActorBatchResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    repeated string errors = 3;
}



message SetActorTransformRequest {
    string actor_path = 1;
    Transform transform = 2;
    Space space = 3;
}
message SetActorTransformResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

// In local space.
message SetActorTransformBatchRequest {
    repeated string actor_paths = 1;
    repeated Transform transforms = 2;
}
message SetActorTransformBatchResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message GetPendingOperationsRequest {
}
message GetPendingOperationsResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    repeated string operations = 3;
}

message GetPendingActorTransformRequest {
    StatusCode status_code = 1;
    string error_message = 2;
    string actor_path = 3;
    Space space = 4;
}
message GetPendingActorTransformResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    Transform transform = 3;
}

message GetPendingActorTransformBatchRequest {
    repeated string actor_paths = 3;
}
message GetPendingActorTransformBatchResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    repeated Transform transforms = 3;
}

message GetSyncFromMujocoToSceneRequest {
}
message GetSyncFromMujocoToSceneResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    bool value = 3;
}


message SetSyncFromMujocoToSceneRequest {
    bool value = 1;
}
message SetSyncFromMujocoToSceneResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    bool value = 3;
}

message ClearSceneRequest {
}
message ClearSceneResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message GetActorAssetsRequest {
}
message GetActorAssetsResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    repeated string actor_asset_names = 3;
}

message GetPendingSelectionChangeRequest {
}
message GetPendingSelectionChangeResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    repeated string actor_paths = 3;
}

message GetPendingAddItemRequest {
}
message GetPendingAddItemResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    Transform transform = 3;
    string actor_name = 4;
}

message SetSelectionRequest {
    repeated string actor_paths = 1;
}
message SetSelectionResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}


message SaveStateRequest {
}
message SaveStateResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message RestoreStateRequest {
}
message RestoreStateResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message DeleteActorRequest {
    string actor_path = 1;
}
message DeleteActorResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message RenameActorRequest {
    string actor_path = 1;
    string new_name = 2;
}
message RenameActorResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}


message MoveActorBatchRequest {
    repeated string actor_paths = 1;
    repeated string new_parent_paths = 2;
}
message MoveActorBatchResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message GetWindowIdRequest {
    
}
message GetWindowIdResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    uint64 window_id = 3;
}

message GetGeneratePosRequest {
    float posX = 1;
    float posY = 2;
}
message GetGeneratePosResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    Transform transform = 3;
}


message GetCacheFolderRequest {
}
message GetCacheFolderResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    string cache_folder = 3;
}


message LoadPackageRequest {
    string file_path = 1;
}
message LoadPackageResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message ChangeSimStateRequest {
    bool sim_process_running = 1;
}
message ChangeSimStateResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message ChangeManipulatorTypeRequest {
    int32 manipulator_type = 1;
}
message ChangeManipulatorTypeResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message GetCameraPNGRequest {
    string camera_name = 1;
    string png_path = 2;
    string png_name = 3;
}

message GetCameraPNGResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message GetActorAssetAabbRequest {
    string actor_path = 1;
}

message GetActorAssetAabbResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    repeated float min = 3;
    repeated float max = 4;
}

message QueueMouseEventRequest {
    uint32 button = 1;
    uint32 action = 2;
    float x = 3;
    float y = 4;
}
message QueueMouseEventResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message QueueMouseWheelEventRequest {
    int32 delta = 1;
}
message QueueMouseWheelEventResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message QueueKeyEventRequest {
    uint32 key = 1;
    uint32 action = 2;
}
message QueueKeyEventResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}


message CameraBrief {
    string name = 1;
    int32 index = 2;
    string source = 3;
    string actor_path = 4;
}
message GetCamerasRequest {
}
message GetCamerasResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    repeated CameraBrief cameras = 3;
}

message GetActiveCameraRequest {
}
message GetActiveCameraResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    int32 index = 3;
}

message SetActiveCameraRequest {
    int32 index = 1;
}
message SetActiveCameraResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message GetViewportCameraTransformRequest {
}
message GetViewportCameraTransformResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    Transform transform = 3;
}

message GetCameraDataPNGRequest {
    string camera_name = 1;
    string png_path = 2;
    int64 index = 3;
}
message GetCameraDataPNGResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    Transform transform = 3;
    bool has_color = 4;
    bool has_depth = 5;
    bool has_normal = 6;
    bool has_object_color = 7;
}

// Actor Property related messages.

enum PropertyType {
    Unknown = 0;
    Bool = 1;
    Int = 2;
    Float = 3;
    String = 4;
    Tree = 5;
}

message PropertyValue {
    oneof value_oneof {
        bool value_bool = 3;
        int32 value_int = 4;
        float value_float = 5;
        string value_string = 6;
    }
}

message PropertyValueList {
    repeated PropertyValue items = 1;
}

message Property {
    PropertyType type = 1;
    string name = 2;
    string display_name = 3;
    bool read_only = 4;
    string editor_hint = 5;
}

message TreePropertyNode {
    string name = 1;
    string display_name = 2;
    repeated Property properties = 3;
    repeated TreePropertyNode children = 4;
}

message PropertyGroup {
    string prefix = 1;
    string name = 2;
    string display_name = 3;
    string hint = 4;
    repeated Property properties = 5;
    repeated TreePropertyNode tree_data = 6;
}

message PropertyKey {
    string actor_path = 1;
    string group_prefix = 2;
    string property_name = 3;
    PropertyType property_type = 4;
}

message PropertyKeyList {
    repeated PropertyKey items = 1;
}

message GetPropertyGroupsRequest {
    string actor_path = 1;
}
message GetPropertyGroupsResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    repeated PropertyGroup property_groups = 3;
}

message GetPropertiesRequest {
    PropertyKeyList keys = 1;
}
message GetPropertiesResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    PropertyValueList values = 3;
}

message SetPropertiesRequest {
    PropertyKeyList keys = 1;
    PropertyValueList values = 2;
}
message SetPropertiesResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}


message PropertyGroupList {
    repeated PropertyGroup elements = 1;
}
message GetPropertyGroupsBatchRequest {
    repeated string actor_paths = 1;
}
message GetPropertyGroupsBatchResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    repeated PropertyGroupList property_group_lists = 3;
}


message PublishSceneRequest {
}
message PublishSceneResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

// Entity hierarchy messages

message EntityInfoMessage {
    uint64 entity_id = 1;
    string name = 2;
    string entity_path = 3;
    repeated EntityInfoMessage children = 4;
}

message GetEntityHierarchyRequest {
    string actor_path = 1;
}
message GetEntityHierarchyResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    EntityInfoMessage root_entity = 3;
}

message SetSelectedEntityRequest {
    string actor_path = 1;
    uint64 entity_id = 2;
}
message SetSelectedEntityResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message SetHighlightEntityTreeRequest {
    string actor_path = 1;
    uint64 entity_id = 2;
    bool highlight = 3;
}
message SetHighlightEntityTreeResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message GetEntityPropertyGroupsRequest {
    string actor_path = 1;
    uint64 entity_id = 2;
}
message GetEntityPropertyGroupsResponse {
    StatusCode status_code = 1;
    string error_message = 2;
    repeated PropertyGroup property_groups = 3;
}

message SetHighlightJointRequest {
    uint64 entity_id = 1;
    bool highlight = 2;
}
message SetHighlightJointResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message CustomCommandRequest {
    string command = 1;
}
message CustomCommandResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message SetVisibilityRequest {
    bool visible = 1;
    repeated string actor_paths = 2;
}
message SetVisibilityResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message SetLockRequest {
    bool locked = 1;
    repeated string actor_paths = 2;
}
message SetLockResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}

message SetMoveRotateSensitivityRequest {
    float move_sensitivity = 1;
    float rotate_sensitivity = 2;
}
message SetMoveRotateSensitivityResponse {
    StatusCode status_code = 1;
    string error_message = 2;
}


service GrpcService {
    rpc Aloha(AlohaRequest) returns (AlohaResponse);
    
    rpc AddActorBatch(AddActorBatchRequest) returns (AddActorBatchResponse);
    rpc DeleteActorBatch(DeleteActorBatchRequest) returns (DeleteActorBatchResponse);

    rpc GetPendingOperations(GetPendingOperationsRequest) returns (GetPendingOperationsResponse);
    rpc GetPendingActorTransformBatch(GetPendingActorTransformBatchRequest) returns (GetPendingActorTransformBatchResponse);
    rpc SetActorTransformBatch(SetActorTransformBatchRequest) returns (SetActorTransformBatchResponse);

    rpc GetSyncFromMujocoToScene(GetSyncFromMujocoToSceneRequest) returns (GetSyncFromMujocoToSceneResponse);
    rpc SetSyncFromMujocoToScene(SetSyncFromMujocoToSceneRequest) returns (SetSyncFromMujocoToSceneResponse);

    rpc ClearScene(ClearSceneRequest) returns (ClearSceneResponse);
    rpc GetActorAssets(GetActorAssetsRequest) returns (GetActorAssetsResponse);

    rpc GetPendingSelectionChange(GetPendingSelectionChangeRequest) returns (GetPendingSelectionChangeResponse);
    rpc GetPendingAddItem(GetPendingAddItemRequest) returns (GetPendingAddItemResponse);
    rpc SetSelection(SetSelectionRequest) returns (SetSelectionResponse);

    rpc SaveState(SaveStateRequest) returns (SaveStateResponse);
    rpc RestoreState(RestoreStateRequest) returns (RestoreStateResponse);

    rpc RenameActor(RenameActorRequest) returns (RenameActorResponse);
    rpc MoveActorBatch(MoveActorBatchRequest) returns (MoveActorBatchResponse);

    rpc GetWindowId(GetWindowIdRequest) returns (GetWindowIdResponse);
    rpc GetGeneratePos(GetGeneratePosRequest) returns (GetGeneratePosResponse);

    rpc GetCacheFolder(GetCacheFolderRequest) returns (GetCacheFolderResponse);
    rpc LoadPackage(LoadPackageRequest) returns (LoadPackageResponse);
    rpc ChangeSimState(ChangeSimStateRequest) returns (ChangeSimStateResponse);
    rpc ChangeManipulatorType(ChangeManipulatorTypeRequest) returns (ChangeManipulatorTypeResponse);

    rpc GetCameraPNG(GetCameraPNGRequest) returns (GetCameraPNGResponse);
    rpc GetActorAssetAabb(GetActorAssetAabbRequest) returns (GetActorAssetAabbResponse);

    rpc QueueMouseEvent(QueueMouseEventRequest) returns (QueueMouseEventResponse);
    rpc QueueMouseWheelEvent(QueueMouseWheelEventRequest) returns (QueueMouseWheelEventResponse);
    rpc QueueKeyEvent(QueueKeyEventRequest) returns (QueueKeyEventResponse);

    rpc GetCameras(GetCamerasRequest) returns (GetCamerasResponse);
    rpc GetActiveCamera(GetActiveCameraRequest) returns (GetActiveCameraResponse);
    rpc SetActiveCamera(SetActiveCameraRequest) returns (SetActiveCameraResponse);
    rpc GetViewportCameraTransform(GetViewportCameraTransformRequest) returns (GetViewportCameraTransformResponse);
    rpc GetCameraDataPNG(GetCameraDataPNGRequest) returns (GetCameraDataPNGResponse);

    rpc GetPropertyGroups(GetPropertyGroupsRequest) returns (GetPropertyGroupsResponse);
    rpc GetPropertyGroupsBatch(GetPropertyGroupsBatchRequest) returns (GetPropertyGroupsBatchResponse);
    rpc GetProperties(GetPropertiesRequest) returns (GetPropertiesResponse);
    rpc SetProperties(SetPropertiesRequest) returns (SetPropertiesResponse);


    rpc SetHighlightJoint(SetHighlightJointRequest) returns (SetHighlightJointResponse);
    rpc CustomCommand(CustomCommandRequest) returns (CustomCommandResponse);

    rpc SetVisibility(SetVisibilityRequest) returns (SetVisibilityResponse);
    rpc SetLock(SetLockRequest) returns (SetLockResponse);

    rpc SetMoveRotateSensitivity(SetMoveRotateSensitivityRequest) returns (SetMoveRotateSensitivityResponse);

    rpc PublishScene(PublishSceneRequest) returns (PublishSceneResponse);

    // Entity hierarchy related RPCs
    rpc GetEntityHierarchy(GetEntityHierarchyRequest) returns (GetEntityHierarchyResponse);
    rpc SetSelectedEntity(SetSelectedEntityRequest) returns (SetSelectedEntityResponse);
    rpc SetHighlightEntityTree(SetHighlightEntityTreeRequest) returns (SetHighlightEntityTreeResponse);
    rpc GetEntityPropertyGroups(GetEntityPropertyGroupsRequest) returns (GetEntityPropertyGroupsResponse);

}
